<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Amanah</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="icon" type="image/png" href="./assets/logo.PNG">
    <style>
        :root {
            --color-primary: hsl(35.51deg 58.1% 50.39%);
            --color-background: #010101;
        }
    </style>
</head>

<body>
    <div class="root">
        <div class="relative h-full flex flex-col  items-center justify-center text-center
              m-auto min-h-screen
             ">

            <div class="absolute inset-0 z-[-1]"
                style="background: radial-gradient(rgba(221, 156, 60, 0.15), transparent 70%);"></div>
            <div style="background-image: linear-gradient(180deg, hsl(21.46deg 15% 7%) , hsl(21.46deg 15% 7% / 50%), hsl(21.46deg 15% 7% / 50%));"
                class="absolute inset-0"></div>
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="h-full w-full absolute z-[-1] ">
                <img class="h-full w-full object-cover" src="./assets/hero.PNG" alt="">
            </div>
            <div class="main-content relative">
                <div class="store flex flex-col items-center rounded-2xl">
                    <div class="logo-container h-[11rem] w-[16rem] rounded-md overflow-hidden mb-6 shadow-[0_0_57.602px_rgba(221,156,60,0.384)]">
                        <img class="h-full w-full object-cover " src="./assets/logo.PNG" alt="">
                    </div>
                    <p class="name text-[--color-primary] md:text-xl text-lg">Al Asalah Shawrma

                    </p>
                </div>

                <div class="flex flex-col ">
                    <h1
                        class="blocktitle mt-6 mb-4 text-3xl md:text-5xl lg:text-6xl font-display font-bold text-white leading-tight max-w-4xl ">
                        Authentic Flavor Has Arrived in America
                    </h1>
                    <h4 class="subtext text-base md:text-lg text-[#968B80] w-full text-center">From Jordan to the USA —
                        Taste the Original Shawarma Experience.

                    </h4>
                    <div class="mb-10 mt-10">
                        <a href="./assets/Asala Truck Menu.pdf" target="_blank" rel="noopener noreferrer" class="px-8 py-3 rounded-xl text-black bg-[--color-primary] text-[--color-primary] font-semibold text-base hover:opacity-90 transition-all shadow-warm">View Menu</a>
                        <a href="https://maps.app.goo.gl/uaeamP9mLu46t6L26?g_st=ic" target="_blank" rel="noopener noreferrer" class="px-8 py-3 rounded-xl border-2 border-[--color-primary] text-[--color-primary] font-semibold text-base hover:bg-[--color-primary] hover:text-black transition-all">Our Location</a>
                        
                    </div>
                    <div class="social-links flex items-center justify-center gap-4">
                        <a class="flex items-center justify-center rounded-full h-10 w-10 border
                         border-[--color-primary] text-[--color-primary] text-lg hover:opacity-90" href="https://www.tiktok.com/@alasala.shawermausa"> <i
                                class="fab fa-instagram"></i>
                        </a>
                        <a class="flex items-center justify-center rounded-full h-10 w-10 border
                         border-[--color-primary] text-[--color-primary] text-lg hover:opacity-90" href="https://web.facebook.com/ALASALAHSHAWRMA"> <i
                                class="fab fa-facebook"></i>
                        </a>
                        <a class="flex items-center justify-center rounded-full h-10 w-10 border
                         border-[--color-primary] text-[--color-primary] text-lg hover:opacity-90" href="https://www.instagram.com/alasalah.shawarma"> <i
                                class="fab fa-tiktok"></i>
                        </a>
                        <a class="flex items-center justify-center rounded-full h-10 w-10 border
                        border-[--color-primary] text-[--color-primary] text-lg hover:opacity-90"
                        href="tel:+19048882544">
                            <i class="fas fa-phone"></i>
                        </a>
                    </div>
                </div>
            </div>


        </div>
    </div>
</body>

</html>
